set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# set default shell
set-option -g default-shell /usr/bin/fish

# remap prefix from 'C-b' to 'C-g'
unbind C-b
set-option -g prefix C-g
bind-key C-g send-prefix

# enable mouse scrolling, clicking and resizing
set -g mouse on

# increase history
set-option -g history-limit 100000

# set first windows and panes to start with one
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# performance
set -sg escape-time 10
set -g focus-events on

# --- SPLITS (Ctrl+Alt+hjkl, no prefix) ---
bind -n C-M-h split-window -hc "#{pane_current_path}" \; swap-pane -s "!" \; select-pane -l
bind -n C-M-l split-window -hc "#{pane_current_path}"
bind -n C-M-k split-window -vc "#{pane_current_path}" \; swap-pane -s "!" \; select-pane -l
bind -n C-M-j split-window -vc "#{pane_current_path}"

# --- PANE NAVIGATION (Alt+hjkl, no prefix) ---
bind -n M-h select-pane -L
bind -n M-l select-pane -R
bind -n M-k select-pane -U
bind -n M-j select-pane -D

# --- RESIZE (Use M-H instead of M-S-h) ---
bind -n M-H resize-pane -L 5
bind -n M-L resize-pane -R 5
bind -n M-K resize-pane -U 5
bind -n M-J resize-pane -D 5

# --- SWAP PANES (Prefix = Ctrl+g + Shift+hjkl) ---
# Use capital H/J/K/L to swap. Focus stays on current pane (-d)
bind H swap-pane -d -t "{left-of}"
bind L swap-pane -d -t "{right-of}"
bind K swap-pane -d -t "{up-of}"
bind J swap-pane -d -t "{down-of}"

# --- WINDOWS & SESSIONS (prefix = Ctrl+g) ---
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"
